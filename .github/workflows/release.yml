name: release

# Cut a release by bumping the version in app/apps/desktop/src-tauri/tauri.conf.json
# (and package.json), then pushing a matching tag:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# This builds signed bundles for macOS (arm64 + x64), Windows, and Linux, and
# drafts a GitHub Release with the installers + latest.json (the updater
# manifest). Review the draft, then click "Publish" — only then does
# `releases/latest` point at it and do running apps see the update.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/apps/desktop/src-tauri -> target'

      - name: Install dependencies
        working-directory: app
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing key (minisign). Generated locally with
          # `tauri signer generate`; add both as repo Actions secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization (macOS only; ignored elsewhere).
          # Until these secrets exist, macOS builds are ad-hoc signed and will
          # trip Gatekeeper on download. To enable clean installs, add all six
          # as repo Actions secrets (see docs/RELEASE.md → "macOS code signing"):
          #   APPLE_CERTIFICATE            base64 of the exported Developer ID .p12
          #   APPLE_CERTIFICATE_PASSWORD   password for that .p12
          #   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
          #   APPLE_ID                     Apple account email
          #   APPLE_PASSWORD               app-specific password (not the account password)
          #   APPLE_TEAM_ID                10-char team id
          # tauri-action imports the cert into a temp keychain, signs with the
          # hardened runtime, and notarizes automatically when these are present.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app/apps/desktop
          tagName: v__VERSION__
          releaseName: 'Baalda v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
