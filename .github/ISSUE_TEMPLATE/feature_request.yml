name: Feature request
description: Suggest an idea or improvement for OpenContext
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger changes, please open an issue to discuss before sending a PR.
        See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: fit
    attributes:
      label: Fit with the project
      options:
        - label: I've read the docs/specs and this aligns with OpenContext's local-first, files-as-source-of-truth design.
