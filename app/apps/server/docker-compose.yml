services:
  postgres:
    image: postgres:16-alpine
    container_name: context-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: context
      POSTGRES_PASSWORD: context
      POSTGRES_DB: context
    ports:
      # Host 5439 -> container 5432 (avoids clashing with a local Postgres on 5432)
      - "5439:5432"
    volumes:
      - context_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context -d context"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Optional: only for multi-instance / HA vault sync (spec 05). Single-instance
  # dev and self-host need nothing here. Start with: `docker compose --profile ha up`.
  redis:
    image: redis:7-alpine
    container_name: context-redis
    restart: unless-stopped
    profiles: ["ha"]
    ports:
      - "6389:6379" # Host 6389 -> container 6379 (avoids clashing with a local Redis)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  context_pgdata:
